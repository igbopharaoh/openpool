services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openpool
      POSTGRES_USER: openpool
      POSTGRES_PASSWORD: openpool
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openpool -d openpool"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: openpool
      MINIO_ROOT_PASSWORD: openpool-local-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
