name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: openpool
          POSTGRES_USER: openpool
          POSTGRES_PASSWORD: openpool
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U openpool -d openpool"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://openpool:openpool@localhost:5432/openpool
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo check -p openpool-api -p openpool-worker
      - run: rustup target add wasm32-unknown-unknown
      - run: cargo check -p openpool-protocol --target wasm32-unknown-unknown
      - run: cargo check -p openpool-verifier --target wasm32-unknown-unknown
      - run: cargo test --workspace
      - run: cargo test --workspace -- --ignored
      - run: "! rg -i 'v[l]rp' --glob '!target/**'"
